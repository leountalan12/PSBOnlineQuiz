<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Proctored Online Examination</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
text-align:center;
}

header{
background:#0d47a1;
color:white;
padding:15px;
}

.timerBox{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

#timer{
font-size:48px;
font-weight:bold;
color:#c62828;
}

.panel{
margin:15px;
}

input{
padding:10px;
font-size:16px;
margin:5px;
width:340px;
}

button{
padding:10px 16px;
font-size:16px;
margin:5px;
cursor:pointer;
}

iframe{
width:90%;
max-width:900px;
height:900px;
border:none;
margin-top:20px;
}

#cameraBox{
position:fixed;
top:10px;
right:10px;
background:white;
padding:6px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

video{
width:180px;
border-radius:6px;
}

#studentLink{
width:80%;
}

.warning{color:orange;}
.danger{color:red;}

</style>
</head>

<body>

<header>
<h2>Proctored Online Examination</h2>
<p>Camera must remain ON. Do not switch tabs.</p>
</header>

<div class="timerBox">
<div id="timer">30:00</div>
<button id="startExam">Start Exam</button>
</div>

<!-- TEACHER PANEL -->
<div class="panel" id="teacherPanel">

<input id="formLink" placeholder="Paste Google Form link">

<input id="timeInput" type="number" placeholder="Timer (minutes)" value="30">

<br>

<button onclick="loadForm()">Load Form</button>

<button onclick="generateLink()">Generate Student Link</button>

<br><br>

<input id="studentLink" readonly placeholder="Student exam link will appear here">

</div>

<!-- CAMERA MONITOR -->
<div id="cameraBox">
<video id="camera" autoplay muted playsinline></video>
</div>

<!-- GOOGLE FORM -->
<iframe id="examForm"></iframe>

<script>

let seconds = 1800;
let timerInterval;
let examStarted = false;
let stream;

const timerDisplay = document.getElementById("timer");
const video = document.getElementById("camera");
const formFrame = document.getElementById("examForm");

function updateTimerDisplay(){
let m = Math.floor(seconds/60);
let s = seconds%60;
timerDisplay.innerHTML =
String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function loadForm(){

let link = document.getElementById("formLink").value;

if(link===""){
alert("Paste Google Form link first.");
return;
}

if(!link.includes("embedded")){
link = link.replace("viewform","viewform?embedded=true");
}

formFrame.src = link;

let minutes = document.getElementById("timeInput").value;
seconds = minutes * 60;

updateTimerDisplay();
}

function generateLink(){

let form = document.getElementById("formLink").value;
let time = document.getElementById("timeInput").value;

if(form===""){
alert("Paste Google Form link first.");
return;
}

let baseURL = window.location.origin + window.location.pathname;

let link =
baseURL +
"?form=" + encodeURIComponent(form) +
"&time=" + time;

document.getElementById("studentLink").value = link;
}

document.getElementById("startExam").addEventListener("click", startExam);

async function startExam(){

if(examStarted) return;

try{

stream = await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject = stream;

examStarted = true;

startTimer();
openFullscreen();

}
catch(error){

alert("Camera permission is required before starting.");

}

}

function startTimer(){

timerInterval = setInterval(function(){

let minutes = Math.floor(seconds/60);
let secs = seconds % 60;

timerDisplay.innerHTML =
String(minutes).padStart(2,'0') + ":" +
String(secs).padStart(2,'0');

if(seconds <= 300){
timerDisplay.classList.add("warning");
}

if(seconds <= 60){
timerDisplay.classList.add("danger");
}

if(seconds <= 0){

clearInterval(timerInterval);

alert("Time is finished. Submit your form.");

window.scrollTo(0,document.body.scrollHeight);

}

seconds--;

},1000);

}

function openFullscreen(){

let elem = document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}

document.addEventListener("visibilitychange", function(){

if(examStarted && document.hidden){
alert("Warning: Tab switching detected.");
}

});

window.onbeforeunload = function(){

if(examStarted){
return "Refreshing will not stop the exam.";
}

}

function loadFromURL(){

const params = new URLSearchParams(window.location.search);

const formLink = params.get("form");
const duration = params.get("time");

if(formLink){

document.getElementById("teacherPanel").style.display = "none";

let link = decodeURIComponent(formLink);

if(!link.includes("embedded")){
link = link.replace("viewform","viewform?embedded=true");
}

formFrame.src = link;

}

if(duration){

seconds = duration * 60;
updateTimerDisplay();

}

}

loadFromURL();

</script>

</body>
</html>
