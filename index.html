<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSB Secured Online Summative Tests</title>
    
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        header { background: #800000; color: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Teacher Dashboard Styles */
        #teacherView { display: block; padding: 20px; }
        .setup-card { background: white; padding: 25px; border-radius: 12px; max-width: 550px; margin: 0 auto 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { text-align: left; margin-bottom: 10px; width: 95%; margin-left: auto; margin-right: auto; }
        .input-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        
        .button-row { display: flex; gap: 10px; width: 95%; margin: 15px auto; }
        .btn-gen { background: #0056b3; }
        .btn-launch { background: #2e7d32; }
        
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 10px; }
        .student-box { background: white; padding: 10px; border-radius: 10px; border: 1px solid #ddd; text-align: left; transition: 0.3s; position: relative; }
        .student-box.warning { border-color: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.2); background: #fffefe; }
        .grid-video { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 6px; margin-bottom: 6px; object-fit: cover; }
        
        .student-identity { background: #f8f9fa; padding: 5px 8px; border-radius: 4px; border-left: 4px solid #800000; margin-bottom: 6px; }
        .id-name { font-size: 13px; font-weight: bold; color: #800000; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .id-num { font-size: 10px; color: #666; }

        .stat-row { font-size: 11px; margin: 3px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 1px; }
        .val { font-weight: bold; color: #333; }
        .violation-val { color: #d32f2f; font-weight: bold; }
        
        .btn-terminate { background: #ff4444; color: white; font-size: 10px; padding: 4px; margin-top: 5px; border-radius: 4px; cursor: pointer; border: none; width: 100%; font-weight: bold; }
        .btn-terminate:hover { background: #cc0000; }

        .room-live-tag { color: #2e7d32; font-weight: bold; margin: 10px 0; display: none; padding: 10px; border: 1px dashed #2e7d32; border-radius: 5px; }

        /* Student View Styles */
        #studentUI { display: none; padding: 15px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 320px; }
        
        .timer-container { display: inline-block; background: #e3f2fd; padding: 10px 20px; border-radius: 10px; border: 2px solid #bbdefb; margin-bottom: 10px; }
        .timer-label { font-size: 14px; font-weight: bold; color: #0056b3; margin-bottom: 2px; display: block; }
        #timer { font-size: 32px; font-weight: bold; color: #d32f2f; }
        
        .iframe-container { width: 100%; max-width: 1100px; margin: 15px auto; height: 70vh; border-radius: 12px; overflow: hidden; border: 3px solid #800000; }
        iframe { width: 100%; height: 100%; border: none; }

        input { padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { padding: 12px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #localCam { position: fixed; bottom: 15px; left: 15px; width: 130px; border: 3px solid white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; display: none; }
    </style>
</head>
<body>

<header>
    <h2 id="headerTitle">PSB Secured Online Summative Tests</h2>
</header>

<div id="overlay" style="display:none;">
    <div class="login-box">
        <h3>Student Access</h3>
        <input type="text" id="sName" placeholder="Full Name">
        <input type="text" id="sID" placeholder="Student ID Number">
        <br><br>
        <button style="background:#800000" onclick="enterExam()">Join Session</button>
    </div>
</div>

<div id="teacherView">
    <div class="setup-card">
        <h3>Proctor Setup</h3>
        <div class="input-group"><input id="tGrade" placeholder="Grade Level"></div>
        <div class="input-group"><input id="tSection" placeholder="Section"></div>
        <div class="input-group"><input id="tName" placeholder="Teacher Name"></div>
        <div class="input-group"><input id="tForm" placeholder="Google forms responders link"></div>
        <div class="input-group">
            <label for="tMinutes">Timer in Minutes:</label>
            <input id="tMinutes" type="number" value="30">
        </div>
        <div class="input-group">
            <label>Student Generated URL:</label>
            <input id="copyLink" readonly onclick="this.select()" placeholder="Link will appear after generating...">
        </div>
        <div class="button-row">
            <button class="btn-gen" onclick="generateStudentLink()">1. Generate Link</button>
            <button id="launchBtn" class="btn-launch" onclick="initTeacher()" disabled>2. Launch Proctor Room</button>
        </div>
        <div id="roomTag" class="room-live-tag"></div>
    </div>
    <div id="grid"></div>
</div>

<div id="studentUI">
    <div class="timer-container">
        <span class="timer-label">Time Left:</span>
        <div id="timer">00:00</div>
    </div>
    <br>
    <button id="btnStart" style="background:#2e7d32; width: auto; padding: 15px 40px;" onclick="startOfficialTest()">START SECURE EXAM</button>
    <div class="iframe-container">
        <iframe id="testFrame" src="about:blank"></iframe>
    </div>
</div>

<video id="localCam" autoplay muted playsinline></video>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const isStudentMode = urlParams.has("form");
    const PEER_ID_PREFIX = "psb-proctor-";
    const PEER_CONFIG = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } };
    
    let myPeer, dataConnections = {}, videoStream;
    let examStarted = false;
    let roomID = "";
    let logs = { tabs: 0, gazes: 0, start: "--", end: "--" };
    let timeLeft = 0;

    async function init() {
        if (isStudentMode) {
            document.getElementById("teacherView").style.display = "none";
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("studentUI").style.display = "block";
            roomID = PEER_ID_PREFIX + urlParams.get("room");
            timeLeft = parseInt(urlParams.get("time")) * 60;
            updateTimerDisplay();
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
        }
    }

    function generateStudentLink() {
        const grade = document.getElementById("tGrade").value.trim();
        const section = document.getElementById("tSection").value.trim();
        const teacher = document.getElementById("tName").value.trim();
        const form = document.getElementById("tForm").value.trim();
        const time = document.getElementById("tMinutes").value;
        if (!grade || !section || !teacher || !form) return alert("Please fill all details.");
        const cleanID = `${grade}-${section}-${teacher}`.replace(/\s+/g, '-').toLowerCase();
        const base = window.location.href.split('?')[0];
        document.getElementById("copyLink").value = `${base}?form=${encodeURIComponent(form)}&time=${time}&room=${cleanID}`;
        document.getElementById("launchBtn").disabled = false;
    }

    function initTeacher() {
        const grade = document.getElementById("tGrade").value;
        const section = document.getElementById("tSection").value;
        const teacher = document.getElementById("tName").value;
        const cleanID = `${grade}-${section}-${teacher}`.replace(/\s+/g, '-').toLowerCase();
        roomID = PEER_ID_PREFIX + cleanID;

        myPeer = new Peer(roomID, PEER_CONFIG);
        myPeer.on('open', (id) => {
            document.getElementById("roomTag").style.display = "block";
            document.getElementById("roomTag").innerText = "● LIVE PROCTORING: " + grade + " - " + section;
            document.getElementById("launchBtn").innerText = "Room Active";
            document.getElementById("launchBtn").disabled = true;
        });

        setupGrid();

        myPeer.on("call", call => {
            call.answer();
            call.on("stream", remoteStream => {
                const slots = document.querySelectorAll('.student-box');
                for (let box of slots) {
                    if (box.dataset.occupied === "false") {
                        box.dataset.occupied = "true";
                        box.dataset.peerid = call.peer;
                        box.dataset.sid = call.metadata.id;
                        box.querySelector('video').srcObject = remoteStream;
                        box.querySelector('.id-name').innerText = call.metadata.name;
                        box.querySelector('.id-num').innerText = "ID: " + call.metadata.id;
                        box.querySelector('.btn-terminate').style.display = "block";
                        break;
                    }
                }
            });
        });

        myPeer.on('connection', conn => {
            dataConnections[conn.peer] = conn;
            conn.on('data', data => {
                const boxes = document.querySelectorAll('.student-box');
                boxes.forEach(box => {
                    if (box.dataset.sid === data.studentID) {
                        box.querySelector('.t-start').innerText = data.start;
                        box.querySelector('.t-end').innerText = data.end;
                        box.querySelector('.v-tabs').innerText = data.tabs;
                        box.querySelector('.v-gaze').innerText = data.gazes;
                        if (data.tabs > 0 || data.gazes > 10) box.classList.add('warning');
                    }
                });
            });
        });
    }

    function terminateStudent(btn) {
        const box = btn.closest('.student-box');
        const peerId = box.dataset.peerid;
        if (peerId && dataConnections[peerId]) {
            if(confirm("Are you sure you want to terminate this student's exam?")) {
                dataConnections[peerId].send({ action: "TERMINATE" });
                box.style.opacity = "0.5";
                btn.innerText = "Terminated";
                btn.disabled = true;
            }
        }
    }

    function setupGrid() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        for (let i = 1; i <= 40; i++) {
            grid.innerHTML += `
                <div class="student-box" data-occupied="false" data-sid="" data-peerid="">
                    <video class="grid-video" autoplay muted playsinline></video>
                    <div class="student-identity">
                        <span class="id-name">Station ${i} (Empty)</span>
                        <span class="id-num">Waiting...</span>
                    </div>
                    <div class="stat-row">Start: <span class="val t-start">--</span></div>
                    <div class="stat-row">End: <span class="val t-end">--</span></div>
                    <div class="stat-row">Tabs: <span class="violation-val v-tabs">0</span></div>
                    <div class="stat-row">Gaze: <span class="violation-val v-gaze">0</span></div>
                    <button class="btn-terminate" style="display:none;" onclick="terminateStudent(this)">Terminate Exam</button>
                </div>`;
        }
    }

    // --- STUDENT LOGIC ---
    function enterExam() {
        const name = document.getElementById("sName").value.trim();
        const sid = document.getElementById("sID").value.trim();
        if (!name || !sid) return alert("Please provide Name and ID.");
        document.getElementById("overlay").style.display = "none";
        document.getElementById("testFrame").src = decodeURIComponent(urlParams.get("form"));
    }

    async function startOfficialTest() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById("localCam").srcObject = videoStream;
            document.getElementById("localCam").style.display = "block";
            document.getElementById("btnStart").style.display = "none";
            logs.start = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            examStarted = true;
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            connectToTeacher();
            startTimer();
            beginAITracking();
        } catch (err) { alert("Camera access required."); }
    }

    function connectToTeacher() {
        myPeer = new Peer(null, PEER_CONFIG);
        myPeer.on('open', (id) => {
            const metadata = { name: document.getElementById("sName").value, id: document.getElementById("sID").value };
            myPeer.call(roomID, videoStream, { metadata });
            const conn = myPeer.connect(roomID);
            conn.on('data', (data) => {
                if (data.action === "TERMINATE") {
                    alert("Your exam has been terminated by the proctor.");
                    finishSession();
                }
            });
            window.activeConn = conn;
        });
    }

    function beginAITracking() {
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && examStarted) { logs.tabs++; syncLogs(); }
        });
        setInterval(async () => {
            if (!examStarted) return;
            const detections = await faceapi.detectSingleFace(document.getElementById("localCam"), new faceapi.TinyFaceDetectorOptions());
            if (!detections) { logs.gazes++; syncLogs(); }
        }, 3000);
    }

    function syncLogs() {
        if (window.activeConn && window.activeConn.open) {
            window.activeConn.send({
                studentID: document.getElementById("sID").value,
                tabs: logs.tabs,
                gazes: logs.gazes,
                start: logs.start,
                end: logs.end
            });
        }
    }

    function startTimer() {
        const timerInterval = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(timerInterval); finishSession(); }
            if (examStarted) { timeLeft--; updateTimerDisplay(); }
        }, 1000);
    }

    function updateTimerDisplay() {
        let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById("timer").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function finishSession() {
        logs.end = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        examStarted = false;
        syncLogs();
        window.location.href = "about:blank";
    }

    init();
</script>
</body>
</html>
