<script>

let seconds = 1800;
let timerInterval;
let examStarted = false;
let stream;

const timerDisplay = document.getElementById("timer");
const startBtn = document.getElementById("startExam");
const video = document.getElementById("camera");
const formFrame = document.getElementById("examForm");

function getURLParameters(){

const params = new URLSearchParams(window.location.search);

const formLink = params.get("form");
const duration = params.get("time");

if(formLink){

let link = formLink;

if(!link.includes("embedded")){
link = link.replace("viewform","viewform?embedded=true");
}

formFrame.src = link;

}

if(duration){

seconds = duration * 60;

updateTimerDisplay();

}

}

function updateTimerDisplay(){

let m = Math.floor(seconds/60);
let s = seconds%60;

timerDisplay.innerHTML =
String(m).padStart(2,'0') + ":" +
String(s).padStart(2,'0');

}

startBtn.addEventListener("click", startExam);

async function startExam(){

if(examStarted) return;

try{

stream = await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject = stream;

examStarted = true;

startTimer();

openFullscreen();

}
catch(error){

alert("Camera permission is required before starting.");

}

}

function startTimer(){

timerInterval = setInterval(function(){

let minutes = Math.floor(seconds/60);
let secs = seconds % 60;

timerDisplay.innerHTML =
String(minutes).padStart(2,'0') + ":" +
String(secs).padStart(2,'0');

if(seconds <= 0){

clearInterval(timerInterval);

alert("Time is finished. Submit your form.");

window.scrollTo(0,document.body.scrollHeight);

}

seconds--;

},1000);

}

function openFullscreen(){

let elem = document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

}

document.addEventListener("visibilitychange", function(){

if(examStarted && document.hidden){
alert("Warning: Tab switching detected.");
}

});

window.onbeforeunload = function(){

if(examStarted){
return "Refreshing will not stop the exam.";
}

};

getURLParameters();

</script>
